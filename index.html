<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shouib AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+Bengali:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0a0a0f;
            --bg-surface: #111118;
            --bg-panel: #16161f;
            --bg-elevated: #1c1c28;
            --bg-hover: #22222f;
            --border: #2a2a3d;
            --border-subtle: #1e1e2e;
            --accent: #7c6af7;
            --accent-soft: #9d8fff;
            --accent-dim: rgba(124, 106, 247, 0.12);
            --accent-glow: rgba(124, 106, 247, 0.25);
            --green: #34d399;
            --green-dim: rgba(52, 211, 153, 0.1);
            --text-primary: #e8e8f0;
            --text-secondary: #8888aa;
            --text-muted: #55556a;
            --text-code: #f59e0b;
            --user-bubble: #1e1a3a;
            --user-border: #3d3580;
            --ai-bubble: #131320;
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --font-main: 'IBM Plex Sans', 'Noto Sans Bengali', sans-serif;
            --font-mono: 'IBM Plex Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-main);
            background: var(--bg-base);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* ── SIDEBAR ── */
        .sidebar {
            width: 260px;
            background: var(--bg-surface);
            border-right: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        .sidebar-logo {
            padding: 28px 22px 20px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .logo-mark {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 34px;
            height: 34px;
            background: var(--accent);
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .logo-icon::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
        }

        .logo-icon svg {
            width: 18px;
            height: 18px;
            fill: white;
        }

        .logo-name {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }

        .logo-badge {
            font-size: 10px;
            background: var(--accent-dim);
            color: var(--accent-soft);
            border: 1px solid rgba(124,106,247,0.2);
            padding: 2px 7px;
            border-radius: 20px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .new-chat-btn {
            margin: 16px 14px;
            padding: 11px 16px;
            background: var(--accent-dim);
            border: 1px solid rgba(124,106,247,0.2);
            border-radius: var(--radius-sm);
            color: var(--accent-soft);
            font-family: var(--font-main);
            font-size: 13.5px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 9px;
            transition: all 0.2s;
            width: calc(100% - 28px);
        }

        .new-chat-btn:hover {
            background: rgba(124,106,247,0.2);
            border-color: rgba(124,106,247,0.35);
        }

        .new-chat-btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; }

        .sidebar-section-label {
            padding: 14px 18px 8px;
            font-size: 10.5px;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 0 8px;
        }

        .history-item {
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 9px;
            transition: all 0.15s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-item:hover { background: var(--bg-hover); color: var(--text-primary); }
        .history-item.active { background: var(--accent-dim); color: var(--accent-soft); }

        .history-item svg { width: 14px; height: 14px; stroke: currentColor; fill: none; flex-shrink: 0; opacity: 0.6; }

        .sidebar-footer {
            padding: 14px;
            border-top: 1px solid var(--border-subtle);
        }

        .model-selector {
            padding: 10px 12px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            gap: 9px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .model-selector:hover { border-color: var(--accent); }

        .model-dot {
            width: 7px;
            height: 7px;
            background: var(--green);
            border-radius: 50%;
            flex-shrink: 0;
            box-shadow: 0 0 6px var(--green);
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .model-name {
            font-size: 12.5px;
            color: var(--text-secondary);
            flex: 1;
        }

        .model-name span { color: var(--text-primary); font-weight: 500; }

        /* ── MAIN CHAT ── */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg-base);
        }

        /* Top bar */
        .topbar {
            padding: 0 28px;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-subtle);
            background: var(--bg-base);
            flex-shrink: 0;
        }

        .topbar-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .topbar-actions {
            display: flex;
            gap: 6px;
        }

        .icon-btn {
            width: 34px;
            height: 34px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .icon-btn:hover { background: var(--bg-elevated); color: var(--text-primary); border-color: var(--border); }
        .icon-btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; }

        /* Chat messages */
        .chat-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 0;
            scroll-behavior: smooth;
        }

        .chat-scroll::-webkit-scrollbar { width: 5px; }
        .chat-scroll::-webkit-scrollbar-track { background: transparent; }
        .chat-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .messages-container {
            max-width: 780px;
            margin: 0 auto;
            padding: 32px 24px 20px;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px 40px;
        }

        .empty-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 24px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .empty-icon svg { width: 28px; height: 28px; stroke: var(--accent); fill: none; }

        .empty-state h2 {
            font-size: 22px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 10px;
            letter-spacing: -0.3px;
        }

        .empty-state p {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
            max-width: 380px;
            margin: 0 auto 32px;
        }

        .suggestion-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            max-width: 520px;
            margin: 0 auto;
        }

        .suggestion-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 14px 16px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
            color: var(--text-primary);
            font-family: var(--font-main);
        }

        .suggestion-card:hover {
            background: var(--bg-elevated);
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .suggestion-card .s-icon {
            font-size: 18px;
            margin-bottom: 8px;
            display: block;
        }

        .suggestion-card .s-title {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 3px;
        }

        .suggestion-card .s-desc {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Message rows */
        .msg-row {
            display: flex;
            gap: 14px;
            margin-bottom: 28px;
            animation: msgIn 0.3s ease;
        }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-row.user { flex-direction: row-reverse; }

        .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .ai-av {
            background: var(--accent);
            color: white;
        }

        .ai-av svg { width: 16px; height: 16px; fill: white; }

        .user-av {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 11px;
        }

        .msg-body { flex: 1; min-width: 0; }

        .msg-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }

        .msg-name {
            font-size: 12.5px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .msg-time {
            font-size: 11px;
            color: var(--text-muted);
        }

        .msg-bubble {
            padding: 14px 18px;
            border-radius: var(--radius-md);
            font-size: 14.5px;
            line-height: 1.72;
            word-wrap: break-word;
        }

        .ai-bubble {
            background: var(--ai-bubble);
            border: 1px solid var(--border-subtle);
            color: var(--text-primary);
            border-top-left-radius: 4px;
        }

        .user-bubble {
            background: var(--user-bubble);
            border: 1px solid var(--user-border);
            color: var(--text-primary);
            border-top-right-radius: 4px;
            max-width: 520px;
            margin-left: auto;
        }

        /* Rich text inside bubbles */
        .msg-bubble h1 {
            font-size: 19px;
            font-weight: 600;
            color: var(--text-primary);
            margin: 16px 0 10px;
            letter-spacing: -0.3px;
        }

        .msg-bubble h2 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin: 14px 0 8px;
        }

        .msg-bubble h3 {
            font-size: 14px;
            font-weight: 600;
            color: var(--accent-soft);
            margin: 12px 0 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .msg-bubble p { margin-bottom: 10px; }
        .msg-bubble p:last-child { margin-bottom: 0; }

        .msg-bubble strong {
            font-weight: 600;
            color: var(--accent-soft);
        }

        .msg-bubble em {
            font-style: italic;
            color: var(--text-secondary);
        }

        .msg-bubble ul, .msg-bubble ol {
            margin: 10px 0;
            padding-left: 22px;
        }

        .msg-bubble li {
            margin-bottom: 5px;
            color: var(--text-primary);
        }

        .msg-bubble li::marker { color: var(--accent); }

        .msg-bubble pre {
            background: #0d0d16;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            margin: 12px 0;
            overflow-x: auto;
            font-family: var(--font-mono);
            font-size: 13px;
            color: #c9d1d9;
            position: relative;
        }

        .msg-bubble code {
            font-family: var(--font-mono);
            font-size: 13px;
            color: var(--text-code);
            background: rgba(245, 158, 11, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .msg-bubble pre code {
            background: none;
            color: inherit;
            padding: 0;
        }

        .msg-bubble blockquote {
            border-left: 3px solid var(--accent);
            padding: 8px 14px;
            margin: 10px 0;
            color: var(--text-secondary);
            font-style: italic;
            background: var(--accent-dim);
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
        }

        .msg-bubble hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 14px 0;
        }

        /* Inline message actions */
        .msg-actions {
            display: flex;
            gap: 4px;
            margin-top: 8px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .msg-row:hover .msg-actions { opacity: 1; }

        .msg-action-btn {
            padding: 4px 10px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 5px;
            color: var(--text-muted);
            font-size: 11.5px;
            cursor: pointer;
            font-family: var(--font-main);
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.15s;
        }

        .msg-action-btn:hover { color: var(--text-primary); border-color: var(--accent); background: var(--accent-dim); }
        .msg-action-btn svg { width: 12px; height: 12px; stroke: currentColor; fill: none; }

        /* Typing indicator */
        .typing-row {
            display: flex;
            gap: 14px;
            margin-bottom: 20px;
        }

        .typing-bubble {
            background: var(--ai-bubble);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            border-top-left-radius: 4px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .t-dots {
            display: flex;
            gap: 5px;
        }

        .t-dots span {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: tdot 1.4s ease infinite;
        }

        .t-dots span:nth-child(2) { animation-delay: 0.2s; }
        .t-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes tdot {
            0%, 60%, 100% { opacity: 0.3; transform: scale(0.9); }
            30% { opacity: 1; transform: scale(1.1); }
        }

        .t-label {
            font-size: 12.5px;
            color: var(--text-muted);
            font-style: italic;
        }

        /* ── INPUT AREA ── */
        .input-zone {
            padding: 16px 24px 20px;
            background: var(--bg-base);
            border-top: 1px solid var(--border-subtle);
            flex-shrink: 0;
        }

        .input-box {
            max-width: 780px;
            margin: 0 auto;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            transition: border-color 0.2s, box-shadow 0.2s;
            overflow: hidden;
        }

        .input-box:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .input-top {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            padding: 14px 16px 10px;
        }

        #userInput {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-family: var(--font-main);
            font-size: 14.5px;
            color: var(--text-primary);
            line-height: 1.6;
            resize: none;
            min-height: 24px;
            max-height: 140px;
            padding: 2px 0;
        }

        #userInput::placeholder { color: var(--text-muted); }

        #sendBtn {
            width: 36px;
            height: 36px;
            background: var(--accent);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        #sendBtn:hover { background: var(--accent-soft); transform: scale(1.05); }
        #sendBtn:active { transform: scale(0.97); }
        #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        #sendBtn svg { width: 16px; height: 16px; stroke: white; fill: none; }

        .input-bottom {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 16px 12px;
        }

        .input-tools {
            display: flex;
            gap: 4px;
        }

        .tool-pill {
            padding: 4px 10px;
            background: transparent;
            border: 1px solid transparent;
            border-radius: 5px;
            color: var(--text-muted);
            font-family: var(--font-main);
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.15s;
        }

        .tool-pill:hover { background: var(--bg-elevated); border-color: var(--border); color: var(--text-secondary); }
        .tool-pill svg { width: 13px; height: 13px; stroke: currentColor; fill: none; }

        .input-hint {
            font-size: 11px;
            color: var(--text-muted);
        }

        .input-hint kbd {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 1px 5px;
            font-family: var(--font-mono);
            font-size: 10px;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .messages-container { padding: 20px 14px; }
            .suggestion-grid { grid-template-columns: 1fr; }
            .input-zone { padding: 12px 14px 16px; }
        }

        /* Cursor blink */
        .cursor-blink {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: var(--accent);
            margin-left: 2px;
            vertical-align: text-bottom;
            animation: blink 1s steps(1) infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Scrollbar for history */
        .chat-history::-webkit-scrollbar { width: 4px; }
        .chat-history::-webkit-scrollbar-track { background: transparent; }
        .chat-history::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="logo-mark">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
                </div>
                <span class="logo-name">Shouib AI</span>
            </div>
        </div>

        <button class="new-chat-btn" onclick="clearChat()">
            <svg viewBox="0 0 24 24" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            নতুন কথোপকথন
        </button>

        <div class="sidebar-section-label">সাম্প্রতিক</div>
        <div class="chat-history" id="chatHistory">
            <div class="history-item active">
                <svg viewBox="0 0 24 24" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                বর্তমান কথোপকথন
            </div>
        </div>

        <div class="sidebar-footer">
            <div class="model-selector">
                <div class="model-dot"></div>
                <div class="model-name"><span>Shouib AI</span> · সক্রিয়</div>
            </div>
        </div>
    </aside>

    <!-- MAIN CHAT -->
    <div class="main">
        <div class="topbar">
            <span class="topbar-title">Shouib AI — বাংলা সহায়ক</span>
            <div class="topbar-actions">
                <button class="icon-btn" onclick="clearChat()" title="চ্যাট মুছুন">
                    <svg viewBox="0 0 24 24" stroke-width="1.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
                </button>
                <button class="icon-btn" onclick="showExamples()" title="উদাহরণ">
                    <svg viewBox="0 0 24 24" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                </button>
            </div>
        </div>

        <div class="chat-scroll" id="chatArea">
            <div class="messages-container" id="messagesContainer">

                <!-- Empty / Welcome state -->
                <div class="empty-state" id="emptyState">
                    <div class="empty-icon">
                        <svg viewBox="0 0 24 24" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    </div>
                    <h2>হ্যালো! আমি Shouib AI 👋</h2>
                    <p>আপনার ব্যক্তিগত বাংলা AI সহায়ক। যেকোনো প্রশ্ন করুন — আমি সাহায্যের জন্য প্রস্তুত।</p>
                    <div class="suggestion-grid">
                        <button class="suggestion-card" onclick="fillSuggestion('বাংলাদেশের ইতিহাস সম্পর্কে বলুন')">
                            <span class="s-icon">🇧🇩</span>
                            <div class="s-title">বাংলাদেশ</div>
                            <div class="s-desc">ইতিহাস ও সংস্কৃতি</div>
                        </button>
                        <button class="suggestion-card" onclick="fillSuggestion('পাইথন প্রোগ্রামিং কিভাবে শিখব?')">
                            <span class="s-icon">💻</span>
                            <div class="s-title">কোডিং</div>
                            <div class="s-desc">শেখার গাইডলাইন</div>
                        </button>
                        <button class="suggestion-card" onclick="fillSuggestion('মেশিন লার্নিং কি এবং কিভাবে কাজ করে?')">
                            <span class="s-icon">🤖</span>
                            <div class="s-title">AI & ML</div>
                            <div class="s-desc">ধারণা ও প্রয়োগ</div>
                        </button>
                        <button class="suggestion-card" onclick="fillSuggestion('ওয়েব ডেভেলপমেন্ট শেখার রোডম্যাপ দিন')">
                            <span class="s-icon">🌐</span>
                            <div class="s-title">ওয়েব ডেভ</div>
                            <div class="s-desc">সম্পূর্ণ রোডম্যাপ</div>
                        </button>
                    </div>
                </div>

            </div>
        </div>

        <!-- INPUT -->
        <div class="input-zone">
            <div class="input-box">
                <div class="input-top">
                    <textarea id="userInput" rows="1" placeholder="আপনার প্রশ্ন লিখুন..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
                    <button id="sendBtn" onclick="sendMessage()">
                        <svg viewBox="0 0 24 24" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                    </button>
                </div>
                <div class="input-bottom">
                    <div class="input-tools">
                        <button class="tool-pill">
                            <svg viewBox="0 0 24 24" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                            সংযুক্তি
                        </button>
                        <button class="tool-pill">
                            <svg viewBox="0 0 24 24" stroke-width="1.5"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
                            কোড
                        </button>
                    </div>
                    <div class="input-hint"><kbd>Enter</kbd> পাঠান · <kbd>Shift+Enter</kbd> নতুন লাইন</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let conversationHistory = [];
        let msgCount = 0;

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 140) + 'px';
        }

        function getTime() {
            return new Date().toLocaleTimeString('bn-BD', { hour: '2-digit', minute: '2-digit' });
        }

        function formatMessage(text) {
            return text
                .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                .replace(/^# (.*$)/gim, '<h1>$1</h1>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/```([\w]*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/^> (.*$)/gim, '<blockquote>$1</blockquote>')
                .replace(/^---$/gim, '<hr>')
                .replace(/^\* (.*$)/gim, '<li>$1</li>')
                .replace(/^\d+\. (.*$)/gim, '<li>$1</li>')
                .split('\n\n')
                .map(p => {
                    if (/^<(h[1-6]|ul|ol|li|pre|blockquote|hr)/.test(p.trim()) || p.trim() === '') return p;
                    return `<p>${p.replace(/\n/g, '<br>')}</p>`;
                })
                .join('')
                .replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>');
        }

        function hideEmptyState() {
            const es = document.getElementById('emptyState');
            if (es) es.style.display = 'none';
        }

        function addUserMessage(text) {
            hideEmptyState();
            const container = document.getElementById('messagesContainer');
            const div = document.createElement('div');
            div.className = 'msg-row user';
            div.innerHTML = `
                <div class="msg-avatar user-av">আপনি</div>
                <div class="msg-body">
                    <div class="msg-meta" style="justify-content:flex-end">
                        <span class="msg-time">${getTime()}</span>
                        <span class="msg-name">আপনি</span>
                    </div>
                    <div class="msg-bubble user-bubble">${text}</div>
                </div>
            `;
            container.appendChild(div);
            scrollDown();
        }

        function addAIMessage(text) {
            const container = document.getElementById('messagesContainer');
            const id = 'ai-msg-' + (++msgCount);
            const div = document.createElement('div');
            div.className = 'msg-row';
            div.id = id;
            div.innerHTML = `
                <div class="msg-avatar ai-av">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></svg>
                </div>
                <div class="msg-body">
                    <div class="msg-meta">
                        <span class="msg-name">Shouib AI</span>
                        <span class="msg-time">${getTime()}</span>
                    </div>
                    <div class="msg-bubble ai-bubble" id="bubble-${id}"></div>
                    <div class="msg-actions">
                        <button class="msg-action-btn" onclick="copyMsg('bubble-${id}')">
                            <svg viewBox="0 0 24 24" stroke-width="1.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                            কপি
                        </button>
                        <button class="msg-action-btn">
                            <svg viewBox="0 0 24 24" stroke-width="1.5"><path d="M14 9V5l7 7-7 7v-4.1C7 14 4 17 3 22 3 13.7 7.7 7 14 6z"/></svg>
                            শেয়ার
                        </button>
                    </div>
                </div>
            `;
            container.appendChild(div);
            scrollDown();
            return 'bubble-' + id;
        }

        function showTyping(show) {
            const existing = document.getElementById('typingRow');
            if (show && !existing) {
                const container = document.getElementById('messagesContainer');
                const div = document.createElement('div');
                div.className = 'typing-row';
                div.id = 'typingRow';
                div.innerHTML = `
                    <div class="msg-avatar ai-av">
                        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></svg>
                    </div>
                    <div class="typing-bubble">
                        <div class="t-dots"><span></span><span></span><span></span></div>
                        <div class="t-label">Shouib AI টাইপ করছে...</div>
                    </div>
                `;
                container.appendChild(div);
                scrollDown();
            } else if (!show && existing) {
                existing.remove();
            }
        }

        function scrollDown() {
            const area = document.getElementById('chatArea');
            setTimeout(() => { area.scrollTop = area.scrollHeight; }, 50);
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const sendBtn = document.getElementById('sendBtn');
            const question = input.value.trim();
            if (!question) return;

            addUserMessage(question);
            conversationHistory.push({ role: 'user', text: question });

            input.value = '';
            input.style.height = 'auto';
            sendBtn.disabled = true;
            showTyping(true);

            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        question: question,
                        history: conversationHistory.slice(-6)
                    })
                });

                const data = await response.json();
                showTyping(false);

                if (data.reply) {
                    const bubbleId = addAIMessage('');
                    const bubble = document.getElementById(bubbleId);
                    const reply = data.reply;

                    let i = 0;
                    const interval = setInterval(() => {
                        if (i < reply.length) {
                            const partial = formatMessage(reply.substring(0, i + 1));
                            bubble.innerHTML = partial + '<span class="cursor-blink"></span>';
                            scrollDown();
                            i++;
                        } else {
                            clearInterval(interval);
                            bubble.innerHTML = formatMessage(reply);
                            conversationHistory.push({ role: 'ai', text: reply });
                        }
                    }, 15);
                } else {
                    addAIMessage('দুঃখিত, এই মুহূর্তে উত্তর দিতে পারছি না।');
                }
            } catch (err) {
                showTyping(false);
                addAIMessage('⚠️ সার্ভারে সমস্যা হয়েছে। আবার চেষ্টা করুন।');
                console.error(err);
            }

            sendBtn.disabled = false;
            input.focus();
        }

        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function fillSuggestion(text) {
            const input = document.getElementById('userInput');
            input.value = text;
            autoResize(input);
            input.focus();
        }

        function copyMsg(id) {
            const el = document.getElementById(id);
            if (el) {
                navigator.clipboard.writeText(el.innerText).then(() => {
                    const btn = el.closest('.msg-body').querySelector('.msg-action-btn');
                    if (btn) { btn.textContent = '✓ কপি হয়েছে'; setTimeout(() => { btn.innerHTML = '<svg viewBox="0 0 24 24" stroke-width="1.5" style="width:12px;height:12px;stroke:currentColor;fill:none"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>কপি'; }, 1500); }
                });
            }
        }

        function clearChat() {
            if (!confirm('সমস্ত কথোপকথন মুছে ফেলবেন?')) return;
            conversationHistory = [];
            const container = document.getElementById('messagesContainer');
            container.innerHTML = `
                <div class="empty-state" id="emptyState">
                    <div class="empty-icon">
                        <svg viewBox="0 0 24 24" stroke-width="1.5" style="width:28px;height:28px;stroke:#7c6af7;fill:none"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    </div>
                    <h2>কথোপকথন শুরু করুন</h2>
                    <p>পুরনো কথোপকথন মুছে ফেলা হয়েছে। নতুন প্রশ্ন করুন।</p>
                    <div class="suggestion-grid">
                        <button class="suggestion-card" onclick="fillSuggestion('বাংলাদেশের ইতিহাস সম্পর্কে বলুন')">
                            <span class="s-icon">🇧🇩</span>
                            <div class="s-title">বাংলাদেশ</div>
                            <div class="s-desc">ইতিহাস ও সংস্কৃতি</div>
                        </button>
                        <button class="suggestion-card" onclick="fillSuggestion('পাইথন প্রোগ্রামিং কিভাবে শিখব?')">
                            <span class="s-icon">💻</span>
                            <div class="s-title">কোডিং</div>
                            <div class="s-desc">শেখার গাইডলাইন</div>
                        </button>
                        <button class="suggestion-card" onclick="fillSuggestion('মেশিন লার্নিং কি এবং কিভাবে কাজ করে?')">
                            <span class="s-icon">🤖</span>
                            <div class="s-title">AI & ML</div>
                            <div class="s-desc">ধারণা ও প্রয়োগ</div>
                        </button>
                        <button class="suggestion-card" onclick="fillSuggestion('ওয়েব ডেভেলপমেন্ট শেখার রোডম্যাপ দিন')">
                            <span class="s-icon">🌐</span>
                            <div class="s-title">ওয়েব ডেভ</div>
                            <div class="s-desc">সম্পূর্ণ রোডম্যাপ</div>
                        </button>
                    </div>
                </div>
            `;
        }

        function showExamples() {
            fillSuggestion('');
            document.getElementById('userInput').focus();
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('userInput').focus();
        });
    </script>
</body>
</html>
